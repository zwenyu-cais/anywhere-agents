site_name: anywhere-agents
site_description: "A maintained, opinionated agent configuration for Claude Code and Codex."
site_url: https://anywhere-agents.readthedocs.io/
site_author: Yue Zhao
repo_url: https://github.com/yzhao062/anywhere-agents
repo_name: yzhao062/anywhere-agents
edit_uri: edit/main/docs/
docs_dir: docs

exclude_docs: |
  hero.html
  avatar.jpg

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys

plugins:
  - search
  - include-markdown:
      rewrite_relative_urls: false

nav:
  - Home: index.md
  - Install: install.md
  - Skills:
    - Overview: skills/index.md
    - implement-review:
      - skills/implement-review.md
      - Review lenses: skills/references/review-lenses.md
    - my-router:
      - skills/my-router.md
      - Routing table: skills/references/routing-table.md
    - ci-mockup-figure: skills/ci-mockup-figure.md
    - readme-polish:
      - skills/readme-polish.md
      - Copyable patterns: skills/references/patterns.md
      - Audit checklist: skills/references/checklist.md
  - AGENTS.md Reference: agents-md.md
  - FAQ: faq.md
  - Changelog: changelog.md
