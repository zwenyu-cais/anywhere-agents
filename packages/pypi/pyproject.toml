[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "anywhere-agents"
version = "0.1.2"
description = "Install the anywhere-agents AI agent config (AGENTS.md, skills, guard hook, settings) into any project."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "Apache-2.0" }
authors = [
  { name = "Yue Zhao" }
]
keywords = [
  "ai",
  "agents",
  "claude-code",
  "codex",
  "config",
  "bootstrap",
  "dotfiles",
  "agent-stack"
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development",
  "Topic :: Utilities"
]

[project.urls]
Homepage = "https://github.com/yzhao062/anywhere-agents"
Repository = "https://github.com/yzhao062/anywhere-agents"
Issues = "https://github.com/yzhao062/anywhere-agents/issues"
Changelog = "https://github.com/yzhao062/anywhere-agents/blob/main/CHANGELOG.md"

[project.scripts]
anywhere-agents = "anywhere_agents.cli:main"

[tool.setuptools]
packages = ["anywhere_agents"]
